
<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Typing Shooter</title>
    <style>
      body {
        margin: 0;
        background: #0e1320;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: Arial, sans-serif;
      }

      canvas {
        background: #111;
        display: block;
      }

      .game-container {
        position: relative;
      }

      .overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 10px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
      }

      .overlay h1 {
        margin: 0;
      }

      .overlay p {
        margin: 0;
      }

      .overlay button {
        margin-top: 8px;
        padding: 10px 18px;
        border: 0;
        border-radius: 8px;
        background: #5fd1ff;
        color: #0f2430;
        font-size: 18px;
        cursor: pointer;
      }

      .overlay.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
