
<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Typing Shooter</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root {
        --bg-1: #060b1a;
        --bg-2: #0d1833;
        --bg-3: #10264a;
        --glow-a: rgba(88, 199, 255, 0.26);
        --glow-b: rgba(42, 121, 255, 0.22);
      }

      * {
        box-sizing: border-box;
      }

      body {
        position: relative;
        overflow: hidden;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, var(--bg-1), var(--bg-2) 45%, var(--bg-3));
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: -8%;
        pointer-events: none;
      }

      body::before {
        background:
          radial-gradient(circle at 14% 18%, var(--glow-a), transparent 35%),
          radial-gradient(circle at 82% 24%, var(--glow-b), transparent 34%),
          radial-gradient(circle at 63% 84%, rgba(120, 245, 255, 0.14), transparent 38%);
        filter: blur(6px);
        animation: floatGlow 14s ease-in-out infinite alternate;
      }

      body::after {
        background:
          radial-gradient(circle, rgba(210, 240, 255, 0.2) 0 1px, transparent 1.4px) 0 0 / 26px 26px,
          radial-gradient(circle, rgba(210, 240, 255, 0.08) 0 1px, transparent 1.2px) 13px 13px / 34px 34px,
          radial-gradient(circle at center, transparent 52%, rgba(0, 0, 0, 0.42) 100%);
        animation: twinkle 6s ease-in-out infinite;
      }

      canvas {
        background: rgba(8, 14, 32, 0.78);
        border: 1px solid rgba(122, 198, 255, 0.16);
        box-shadow:
          0 18px 42px rgba(0, 0, 0, 0.45),
          0 0 26px rgba(95, 209, 255, 0.12);
        backdrop-filter: blur(2px);
        display: block;
      }

      .game-container {
        position: relative;
        z-index: 1;
      }

      .overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 10px;
        background: rgba(2, 10, 26, 0.72);
        color: white;
      }

      .overlay h1 {
        margin: 0;
      }

      .overlay p {
        margin: 0;
      }

      .overlay button {
        margin-top: 8px;
        padding: 10px 18px;
        border: 0;
        border-radius: 8px;
        background: #5fd1ff;
        color: #0f2430;
        font-size: 18px;
        cursor: pointer;
      }

      .symbol-picker {
        display: flex;
        gap: 8px;
      }

      .symbol-picker button {
        margin-top: 0;
        background: rgba(95, 209, 255, 0.18);
        color: #d9f4ff;
        border: 1px solid rgba(95, 209, 255, 0.45);
      }

      .symbol-picker button.active {
        background: #5fd1ff;
        color: #0f2430;
        border-color: transparent;
      }

      .overlay.hidden {
        display: none;
      }

      @keyframes floatGlow {
        0% {
          transform: translate3d(0, 0, 0) scale(1);
        }
        100% {
          transform: translate3d(0, -16px, 0) scale(1.03);
        }
      }

      @keyframes twinkle {
        0%,
        100% {
          opacity: 0.66;
        }
        50% {
          opacity: 0.88;
        }
      }
    </style>
  </head>
  <body>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
